<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Claudia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0C0C0E;--surface:#131316;--surface2:#1A1A1F;--border:#242428;--border2:#2E2E35;
  --text:#F0EFE9;--text2:#8A8A94;--text3:#525258;
  --accent:#C8A96E;--accent2:#E8C98A;--blue:#4A7CF7;--green:#3DBD8A;--red:#E05C6A;--yellow:#E8A020;--purple:#9B6EE0;
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;--shadow:0 8px 32px rgba(0,0,0,0.4);--transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
button,input{font-family:'Instrument Sans',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(12,12,14,0.9);backdrop-filter:blur(20px);position:relative;z-index:100;flex-shrink:0;}
#logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;letter-spacing:-0.3px;color:var(--text);}
#logo span{color:var(--accent)}
#nav{display:flex;gap:2px;background:var(--surface2);border-radius:12px;padding:3px;border:1px solid var(--border)}
.nav-btn{padding:6px 18px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.nav-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.nav-btn:hover:not(.active){color:var(--text)}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}
#cal-wrap{display:flex;flex-direction:column;height:100%;overflow-y:auto;padding:24px}
#cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
#cal-month-label{font-family:'Playfair Display',serif;font-size:20px;font-weight:500}
.cal-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition);}
.cal-arrow:hover{border-color:var(--accent);color:var(--accent)}
#cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;letter-spacing:1px;text-transform:uppercase}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{border-radius:var(--r-sm);padding:8px 6px;cursor:pointer;min-height:72px;transition:background var(--transition);position:relative;}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.has-events{background:var(--surface)}
.cal-cell.today .cal-dn{color:var(--accent);font-weight:600}
.cal-cell.today::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-cell.selected{background:var(--surface2);box-shadow:inset 0 0 0 1px var(--border2)}
.cal-dn{text-align:center;font-size:13px;margin-bottom:6px;color:var(--text2)}
.cal-dots{display:flex;flex-direction:column;gap:2px;padding:0 2px}
.cal-dot{height:3px;border-radius:2px;opacity:0.8}
.cal-more{font-size:9px;color:var(--text3);text-align:center;margin-top:2px}
#sidebar-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-date{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;margin-bottom:2px}
#sidebar-count{font-size:12px;color:var(--text2)}
#sidebar-events{flex:1;overflow-y:auto;padding:12px}
.ev-card{border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);padding:14px;margin-bottom:10px;cursor:pointer;transition:all var(--transition);border-left-width:3px;}
.ev-card:hover{background:var(--surface2);transform:translateX(2px)}
.ev-card-time{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;letter-spacing:0.3px}
.ev-card-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
.ev-card-loc{font-size:12px;color:var(--text3)}
.ev-card-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-top:6px;background:var(--surface2);}
#int-wrap{padding:28px;overflow-y:auto;flex:1}
#int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:20px}
.int-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden;}
.int-card:hover{background:var(--surface2);border-color:var(--border2)}
.int-card-icon{font-size:24px;margin-bottom:10px}
.int-card-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
.int-card-cat{font-size:11px;color:var(--text2)}
.int-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition);}
.int-card:hover .int-del{opacity:1}
#chat-wrap{display:flex;flex-direction:column;height:100%}
#chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;}
.msg{max-width:72%;animation:fadeUp 0.25s ease}
.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}
.msg-bubble{padding:13px 17px;font-size:14px;line-height:1.55;}
.msg.user .msg-bubble{background:var(--accent);color:#1A1408;border-radius:18px 18px 4px 18px;font-weight:500;}
.msg.assistant .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px;}
.msg-thinking .msg-bubble{color:var(--text2);font-style:italic}
#chat-input-row{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;}
#chat-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:12px 16px;font-size:14px;color:var(--text);outline:none;}
#chat-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--accent);color:#1A1408;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all var(--transition);flex-shrink:0;}
#chat-send:hover{background:var(--accent2)}
#voice-bar{border-top:1px solid var(--border);padding:16px 24px;background:rgba(12,12,14,0.95);backdrop-filter:blur(20px);flex-shrink:0;}
#status-row{min-height:28px;display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
#status-text{color:var(--text2)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.spin{width:14px;height:14px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
#voice-input-row{display:flex;gap:10px;align-items:center}
#mic-btn{width:50px;height:50px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:all var(--transition);}
#mic-btn:hover{border-color:var(--accent);color:var(--accent)}
#mic-btn.recording{background:var(--red);border-color:var(--red);color:#fff}
.mic-pulse{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--red);animation:pulseRing 1.2s ease-out infinite;pointer-events:none;}
#voice-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 18px;font-size:14px;color:var(--text);outline:none;}
#voice-text::placeholder{color:var(--text3)}
#voice-send{padding:12px 20px;border-radius:var(--r-md);border:none;background:var(--accent);color:#1A1408;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);display:none;white-space:nowrap;}
#voice-send:hover{background:var(--accent2)}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex}
#modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:28px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow);}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px;}
.modal-close:hover{color:var(--text)}
.conf-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:6px;border:1px solid;margin-top:4px;}
.modal-field{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.modal-icon{font-size:16px;margin-top:1px;flex-shrink:0}
.modal-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.modal-val{font-size:14px;color:var(--text);font-weight:400}
.modal-warn{background:rgba(232,160,32,0.12);border:1px solid rgba(232,160,32,0.25);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--yellow);display:flex;gap:8px;align-items:flex-start;}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.btn-cancel{flex:1;padding:12px;border-radius:var(--r-md);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:all var(--transition);}
.btn-cancel:hover{color:var(--text)}
.btn-primary{flex:2;padding:12px;border-radius:var(--r-md);border:none;background:var(--accent);color:#1A1408;cursor:pointer;font-size:14px;font-weight:600;transition:all var(--transition);}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{flex:1;padding:12px;border-radius:var(--r-md);border:none;background:rgba(224,92,106,0.15);color:var(--red);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition);}
.btn-danger:hover{background:rgba(224,92,106,0.25)}
.empty{padding:48px 24px;text-align:center;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.5}
.empty-text{font-size:14px;line-height:1.5}
.ph{padding:28px 28px 0;flex-shrink:0}
.ph-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;margin-bottom:4px}
.ph-sub{font-size:13px;color:var(--text2)}
@keyframes pulseRing{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.7);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@media(max-width:700px){#sidebar{display:none}.ph{padding:20px 16px 0}#int-wrap{padding:16px}#voice-bar{padding:12px 16px}#chat-messages{padding:16px}}
</style>
</head>
<body>
<div id="header">
  <div id="logo">claudia<span>.</span></div>
  <div id="nav">
    <button class="nav-btn active" onclick="switchView('calendar')">Agenda</button>
    <button class="nav-btn" onclick="switchView('intentions')">Intenções</button>
    <button class="nav-btn" onclick="switchView('chat')">Secretária</button>
  </div>
</div>
<div id="app">
  <div id="view-calendar" class="view active">
    <div id="cal-wrap">
      <div id="cal-nav-row">
        <button class="cal-arrow" onclick="navMonth(-1)">‹</button>
        <span id="cal-month-label"></span>
        <button class="cal-arrow" onclick="navMonth(1)">›</button>
      </div>
      <div id="cal-weekdays">
        <div class="cal-wd">D</div><div class="cal-wd">S</div><div class="cal-wd">T</div>
        <div class="cal-wd">Q</div><div class="cal-wd">Q</div><div class="cal-wd">S</div><div class="cal-wd">S</div>
      </div>
      <div id="cal-grid"></div>
    </div>
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-date"></div>
        <div id="sidebar-count"></div>
      </div>
      <div id="sidebar-events"></div>
    </div>
  </div>
  <div id="view-intentions" class="view" style="overflow-y:auto">
    <div class="ph"><div class="ph-title">Intenções</div><div class="ph-sub">Planos sem data definida</div></div>
    <div id="int-wrap"><div id="int-grid"></div></div>
  </div>
  <div id="view-chat" class="view">
    <div id="chat-wrap">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="Pergunte sobre sua agenda..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button id="chat-send" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>
<div id="voice-bar">
  <div id="status-row"><span id="status-text"></span></div>
  <div id="voice-input-row">
    <button id="mic-btn" onclick="toggleMic()">🎙️</button>
    <input id="voice-text" placeholder='Fale ou escreva: "Dentista sexta às 9h"' oninput="onVoiceInput()" onkeydown="if(event.key==='Enter')submitVoice()"/>
    <button id="voice-send" onclick="submitVoice()">Enviar</button>
  </div>
</div>
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()"><div id="modal-content"></div></div>
</div>

<script>
const COLORS={trabalho:'#4A7CF7',saude:'#3DBD8A',lazer:'#E8A020',familia:'#E05C6A',pessoal:'#9B6EE0',outro:'#8A8A94'};
const ICONS={trabalho:'💼',saude:'🏥',lazer:'🎬',familia:'👨‍👩‍👧',pessoal:'✨',outro:'📌'};
const LABELS={trabalho:'Trabalho',saude:'Saúde',lazer:'Lazer',familia:'Família',pessoal:'Pessoal',outro:'Outro'};
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WDAYS=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

let events=[
  {id:uid(),title:'Reunião de planejamento',date:todayISO(),time:'09:00',category:'trabalho',location:'Sala de reuniões',notes:''},
  {id:uid(),title:'Consulta médica',date:todayISO(),time:'14:30',category:'saude',location:'Clínica São Paulo',notes:''},
];
let intentions=[
  {id:uid(),title:'Assistir filme no cinema',category:'lazer'},
  {id:uid(),title:'Jantar no restaurante japonês',category:'lazer'},
  {id:uid(),title:'Fazer trilha no parque',category:'pessoal'},
];
let chatHistory=[{role:'assistant',content:'Olá! Sou a Claudia, sua assistente pessoal. Pode me perguntar sobre sua agenda, criar eventos por voz ou texto, ou gerenciar suas intenções.'}];
let currentDate=new Date(),selectedDate=new Date(),recognition=null,isRecording=false,pendingAI=null;

function uid(){return Math.random().toString(36).substr(2,9)}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function dateFromISO(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}

function setStatus(msg,type){
  const el=document.getElementById('status-text');
  el.textContent=msg;
  el.style.color=type==='error'?'var(--red)':type==='success'?'var(--green)':type==='recording'?'var(--red)':type==='loading'?'var(--accent)':'var(--text2)';
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelector(`[onclick="switchView('${v}')"]`).classList.add('active');
  document.getElementById('voice-bar').style.display=v==='chat'?'none':'block';
  if(v==='calendar'){renderCalendar();renderSidebar()}
  if(v==='intentions')renderIntentions();
  if(v==='chat')renderChat();
}

function renderCalendar(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  document.getElementById('cal-month-label').textContent=`${MONTHS[m]} ${y}`;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  let html='';
  for(let i=0;i<first;i++)html+='<div></div>';
  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d);
    const iso=`${y}-${pad(m+1)}-${pad(d)}`;
    const dayEvs=events.filter(e=>e.date===iso);
    const isTod=sameDay(date,today),isSel=sameDay(date,selectedDate);
    const dots=dayEvs.slice(0,3).map(e=>`<div class="cal-dot" style="background:${COLORS[e.category]}"></div>`).join('');
    const more=dayEvs.length>3?`<div class="cal-more">+${dayEvs.length-3}</div>`:'';
    html+=`<div class="cal-cell${isTod?' today':''}${isSel?' selected':''}${dayEvs.length?' has-events':''}" onclick="selectDay(${y},${m},${d})"><div class="cal-dn">${d}</div><div class="cal-dots">${dots}${more}</div></div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function selectDay(y,m,d){selectedDate=new Date(y,m,d);renderCalendar();renderSidebar()}

function renderSidebar(){
  const iso=`${selectedDate.getFullYear()}-${pad(selectedDate.getMonth()+1)}-${pad(selectedDate.getDate())}`;
  const dayEvs=events.filter(e=>e.date===iso).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('sidebar-date').textContent=`${selectedDate.getDate()} de ${MONTHS[selectedDate.getMonth()]}`;
  document.getElementById('sidebar-date').style.cssText='font-family:"Playfair Display",serif;font-size:16px;font-weight:500;margin-bottom:2px';
  document.getElementById('sidebar-count').textContent=dayEvs.length===0?'Nenhum compromisso':`${dayEvs.length} compromisso${dayEvs.length>1?'s':''}`;
  document.getElementById('sidebar-events').innerHTML=dayEvs.length===0
    ?`<div class="empty"><div class="empty-icon">🗓️</div><div class="empty-text">Nenhum compromisso<br>neste dia</div></div>`
    :dayEvs.map(e=>`<div class="ev-card" style="border-left-color:${COLORS[e.category]}" onclick="openEventDetail('${e.id}')"><div class="ev-card-time">${e.time}</div><div class="ev-card-title">${e.title}</div>${e.location?`<div class="ev-card-loc">📍 ${e.location}</div>`:''}<span class="ev-card-tag" style="color:${COLORS[e.category]}">${LABELS[e.category]}</span></div>`).join('');
}

function navMonth(dir){currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+dir,1);renderCalendar()}

function renderIntentions(){
  document.getElementById('int-grid').innerHTML=intentions.length===0
    ?`<div class="empty" style="grid-column:1/-1"><div class="empty-icon">💡</div><div class="empty-text">Nenhuma intenção ainda<br>Diga: "Quero viajar para a praia"</div></div>`
    :intentions.map(i=>`<div class="int-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${COLORS[i.category]};border-radius:2px 2px 0 0"></div><div class="int-card-icon">${ICONS[i.category]||'📌'}</div><div class="int-card-title">${i.title}</div><div class="int-card-cat">${LABELS[i.category]}</div><button class="int-del" onclick="event.stopPropagation();deleteIntention('${i.id}')">×</button></div>`).join('');
}

function deleteIntention(id){intentions=intentions.filter(i=>i.id!==id);renderIntentions()}

function renderChat(){
  const el=document.getElementById('chat-messages');
  el.innerHTML=chatHistory.map(m=>`<div class="msg ${m.role}${m.thinking?' msg-thinking':''}"><div class="msg-bubble">${m.content}</div></div>`).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;inp.value='';
  chatHistory.push({role:'user',content:text});
  chatHistory.push({role:'assistant',content:'Pensando...',thinking:true});
  renderChat();
  const today=new Date();
  const sys=`Você é a Claudia, uma secretária pessoal inteligente e elegante. Hoje é ${today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.
Agenda:\n${events.length?events.map(e=>`- ${e.title}: ${e.date} às ${e.time}${e.location?' em '+e.location:''} (${LABELS[e.category]})`).join('\n'):'Nenhum evento.'}
Intenções:\n${intentions.length?intentions.map(i=>`- ${i.title}`).join('\n'):'Nenhuma.'}
Responda em português, natural e conciso.`;
  try{
    const msgs=chatHistory.filter(m=>!m.thinking).map(m=>({role:m.role,content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:msgs})});
    const data=await res.json();
    const answer=data.content?.map(b=>b.text||'').join('')||'Erro ao responder.';
    chatHistory.pop();chatHistory.push({role:'assistant',content:answer});
  }catch{chatHistory.pop();chatHistory.push({role:'assistant',content:'Erro de conexão. Tente novamente.'});}
  renderChat();
}

// ── VOICE ─────────────────────────────────────────────────
async function toggleMic(){
  if(isRecording){stopMic();return;}

  // Request permission explicitly first
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop()); // release immediately
  }catch(err){
    setStatus('Microfone bloqueado: '+err.message,'error');
    return;
  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('Use o Chrome para reconhecimento de voz','error');return;}

  recognition=new SR();
  recognition.lang='pt-BR';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;

  let finalText='';

  recognition.onstart=()=>{
    setStatus('🔴 Ouvindo... fale agora','recording');
  };
  recognition.onspeechstart=()=>{
    setStatus('🔴 Captando voz...','recording');
  };
  recognition.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final)finalText+=final;
    setStatus('🔴 '+(finalText||interim),'recording');
  };
  recognition.onnomatch=()=>setStatus('Não entendi. Tente falar mais alto.','error');
  recognition.onerror=e=>{
    setStatus('Erro: '+e.error,'error');
    setRecording(false);
  };
  recognition.onend=()=>{
    setRecording(false);
    if(finalText.trim()){
      setStatus('Processando: "'+finalText+'"','loading');
      processInput(finalText.trim());
    } else {
      setStatus('Nada captado. Tente novamente.','error');
      setTimeout(()=>setStatus('',''),3000);
    }
  };

  try{recognition.start();setRecording(true);}
  catch(e){setStatus('Erro ao iniciar microfone: '+e.message,'error');}
}

function stopMic(){if(recognition){try{recognition.stop();}catch(e){}}setRecording(false);}

function setRecording(v){
  isRecording=v;
  const btn=document.getElementById('mic-btn');
  btn.className=v?'recording':'';
  btn.textContent=v?'⏹':'🎙️';
  if(v){const r=document.createElement('div');r.className='mic-pulse';btn.appendChild(r);}
  else btn.querySelectorAll('.mic-pulse').forEach(r=>r.remove());
}

function onVoiceInput(){
  document.getElementById('voice-send').style.display=document.getElementById('voice-text').value?'block':'none';
}
function submitVoice(){
  const v=document.getElementById('voice-text').value.trim();
  if(!v)return;
  document.getElementById('voice-text').value='';
  document.getElementById('voice-send').style.display='none';
  processInput(v);
}

async function processInput(text){
  setStatus('Interpretando...','loading');
  const today=new Date();
  const sys=`Você é uma secretária inteligente. Hoje é ${today.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.
Responda SOMENTE com JSON válido, sem markdown.
Tipos:
1. Evento: {"type":"event","title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"trabalho|saude|lazer|familia|pessoal|outro","location":"...","notes":"...","eventType":"individual|conjunto","confidence":"alta|media|baixa","missingInfo":null}
2. Intenção: {"type":"intention","title":"...","category":"trabalho|saude|lazer|familia|pessoal|outro"}
3. Pergunta: {"type":"question","answer":"..."}
Regras: confidence baixa se faltar data/hora, preencha missingInfo. Infira category pelo contexto.`;
  const ctx=`\nAgenda:\n${events.map(e=>`- ${e.title}: ${e.date} às ${e.time}`).join('\n')}\nIntenções:\n${intentions.map(i=>`- ${i.title}`).join('\n')}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:[{role:'user',content:text+ctx}]})});
    const data=await res.json();
    if(data.error){setStatus('Erro API: '+data.error.message,'error');return;}
    const raw=data.content?.map(b=>b.text||'').join('')||'{}';
    pendingAI={...JSON.parse(raw.replace(/```json|```/g,'').trim()),originalText:text};
    setStatus('','');
    showModal();
  }catch(e){
    setStatus('Erro: '+e.message,'error');
    setTimeout(()=>setStatus('',''),4000);
  }
}

function showModal(){
  if(!pendingAI)return;
  const{type}=pendingAI;let html='';
  if(type==='event'){
    const cc={alta:'var(--green)',media:'var(--yellow)',baixa:'var(--red)'}[pendingAI.confidence]||'var(--text3)';
    html=`<div class="modal-header"><div><div class="modal-title">Novo Evento</div><span class="conf-badge" style="color:${cc};border-color:${cc}">${(pendingAI.confidence||'').toUpperCase()}</span></div><button class="modal-close" onclick="closeModal()">×</button></div>
    ${pendingAI.missingInfo?`<div class="modal-warn">⚠️ ${pendingAI.missingInfo}</div>`:''}
    ${mf('📌','Título',pendingAI.title)}${mf('📅','Data',pendingAI.date)}${mf('🕐','Horário',pendingAI.time)}${pendingAI.location?mf('📍','Local',pendingAI.location):''}${mf('🏷️','Categoria',LABELS[pendingAI.category]||pendingAI.category)}${mf('👥','Tipo',pendingAI.eventType==='conjunto'?'Evento conjunto':'Individual')}
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="confirmEvent()">Confirmar evento</button></div>`;
  }else if(type==='intention'){
    html=`<div class="modal-header"><div class="modal-title">💡 Nova Intenção</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text)">${pendingAI.title}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px">${ICONS[pendingAI.category]||''} ${LABELS[pendingAI.category]||''}</div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="confirmIntention()">Salvar intenção</button></div>`;
  }else if(type==='question'){
    html=`<div class="modal-header"><div class="modal-title">Claudia</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="font-size:14px;line-height:1.65;color:var(--text);margin-bottom:24px">${pendingAI.answer}</div>
    <button class="btn-primary" style="width:100%" onclick="closeModal()">Fechar</button>`;
  }else{
    html=`<div class="modal-header"><div class="modal-title">Erro</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div style="font-size:14px;color:var(--red);margin-bottom:20px">${pendingAI.answer||'Erro desconhecido'}</div>
    <button class="btn-primary" style="width:100%" onclick="closeModal()">Fechar</button>`;
  }
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}

function mf(icon,label,val){if(!val)return'';return`<div class="modal-field"><div class="modal-icon">${icon}</div><div><div class="modal-lbl">${label}</div><div class="modal-val">${val}</div></div></div>`}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');pendingAI=null;}

function confirmEvent(){
  if(!pendingAI||pendingAI.type!=='event')return;
  const ev={id:uid(),title:pendingAI.title||'Sem título',date:pendingAI.date||todayISO(),time:pendingAI.time||'00:00',category:pendingAI.category||'outro',location:pendingAI.location||'',notes:pendingAI.notes||''};
  const saved=pendingAI;events.push(ev);closeModal();
  if(saved.date){const[y,m,d]=saved.date.split('-');currentDate=new Date(+y,+m-1,1);selectedDate=new Date(+y,+m-1,+d);}
  renderCalendar();renderSidebar();
}

function confirmIntention(){
  if(!pendingAI||pendingAI.type!=='intention')return;
  intentions.push({id:uid(),title:pendingAI.title,category:pendingAI.category||'outro'});
  closeModal();
  if(document.getElementById('view-intentions').classList.contains('active'))renderIntentions();
}

function openEventDetail(id){
  const e=events.find(ev=>ev.id===id);if(!e)return;
  const d=dateFromISO(e.date);
  const dateLabel=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-header"><div><div style="width:10px;height:10px;border-radius:50%;background:${COLORS[e.category]};display:inline-block;margin-right:8px"></div><span class="modal-title" style="font-size:17px">${e.title}</span></div><button class="modal-close" onclick="closeModal()">×</button></div>
    ${mf('📅','Data',dateLabel)}${mf('🕐','Horário',e.time)}${e.location?mf('📍','Local',e.location):''}${mf('🏷️','Categoria',LABELS[e.category])}${e.notes?mf('📝','Notas',e.notes):''}
    <div class="modal-actions"><button class="btn-danger" onclick="deleteEvent('${e.id}')">Excluir</button><button class="btn-primary" onclick="closeModal()">Fechar</button></div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function deleteEvent(id){events=events.filter(e=>e.id!==id);closeModal();renderCalendar();renderSidebar();}

renderCalendar();renderSidebar();renderChat();
</script>
