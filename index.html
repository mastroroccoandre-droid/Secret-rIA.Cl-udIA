<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Claudia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0C0C0E;--surface:#131316;--surface2:#1A1A1F;--border:#242428;--border2:#2E2E35;
  --text:#F0EFE9;--text2:#8A8A94;--text3:#525258;
  --accent:#C8A96E;--accent2:#E8C98A;--blue:#4A7CF7;--green:#3DBD8A;--red:#E05C6A;--yellow:#E8A020;--purple:#9B6EE0;
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;--shadow:0 8px 32px rgba(0,0,0,0.4);--transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
button,input,textarea{font-family:'Instrument Sans',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

#header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--border);background:rgba(12,12,14,0.95);backdrop-filter:blur(20px);position:relative;z-index:100;flex-shrink:0;}
#logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;letter-spacing:-0.3px;}
#logo span{color:var(--accent)}
#nav{display:flex;gap:2px;background:var(--surface2);border-radius:12px;padding:3px;border:1px solid var(--border)}
.nav-btn{padding:6px 14px;border-radius:9px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.nav-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.nav-btn:hover:not(.active){color:var(--text)}

#app{display:flex;flex:1;overflow:hidden}
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

#cal-container{display:flex;flex:1;overflow:hidden}
#cal-wrap{flex:1;overflow-y:auto;padding:24px;min-width:0}
#cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
#cal-month-label{font-family:'Playfair Display',serif;font-size:20px;font-weight:500}
.cal-arrow{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--transition);}
.cal-arrow:hover{border-color:var(--accent);color:var(--accent)}

#today-summary{background:linear-gradient(135deg,rgba(200,169,110,0.08),rgba(74,124,247,0.05));border:1px solid var(--border);border-radius:var(--r-md);padding:14px 18px;margin-bottom:20px;font-size:13px;line-height:1.55;color:var(--text);display:none;}
#today-summary.show{display:block;animation:fadeUp 0.4s ease}
.summary-label{font-size:10px;color:var(--accent);font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}

#cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.cal-wd{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;letter-spacing:1px;text-transform:uppercase}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{border-radius:var(--r-sm);padding:8px 6px;cursor:pointer;min-height:72px;transition:background var(--transition);position:relative;}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.has-events{background:var(--surface)}
.cal-cell.today .cal-dn{color:var(--accent);font-weight:600}
.cal-cell.today::after{content:'';position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-cell.selected{background:var(--surface2);box-shadow:inset 0 0 0 1px var(--border2)}
.cal-dn{text-align:center;font-size:13px;margin-bottom:6px;color:var(--text2)}
.cal-dots{display:flex;flex-direction:column;gap:2px;padding:0 2px}
.cal-dot{height:3px;border-radius:2px;opacity:0.85}
.cal-more{font-size:9px;color:var(--text3);text-align:center;margin-top:2px}

#sidebar{width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#sidebar-header{padding:20px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#sidebar-date{font-family:'Playfair Display',serif;font-size:16px;font-weight:500;margin-bottom:2px}
#sidebar-count{font-size:12px;color:var(--text2)}
#sidebar-events{flex:1;overflow-y:auto;padding:12px}
.ev-card{border-radius:var(--r-md);border:1px solid var(--border);background:var(--surface);padding:14px;margin-bottom:10px;cursor:pointer;transition:all var(--transition);border-left-width:3px;position:relative;}
.ev-card:hover{background:var(--surface2);transform:translateX(2px)}
.ev-time{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;letter-spacing:0.3px}
.ev-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
.ev-loc{font-size:12px;color:var(--text3)}
.ev-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-top:6px;background:var(--surface2);}
.ev-rec{position:absolute;top:10px;right:10px;font-size:10px;color:var(--text3)}

.list-wrap{padding:28px;overflow-y:auto;flex:1}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;transition:all var(--transition);position:relative;overflow:hidden;}
.card:hover{background:var(--surface2);border-color:var(--border2)}
.card-strip{position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.card-icon{font-size:24px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px;color:var(--text)}
.card-sub{font-size:11px;color:var(--text2)}
.card-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:none;background:var(--surface2);color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--transition);}
.card:hover .card-del{opacity:1}

#chat-wrap{display:flex;flex-direction:column;height:100%}
#chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px;}
.msg{max-width:72%;animation:fadeUp 0.25s ease}
.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}
.msg-bubble{padding:13px 17px;font-size:14px;line-height:1.6;white-space:pre-wrap;}
.msg.user .msg-bubble{background:var(--accent);color:#1A1408;border-radius:18px 18px 4px 18px;font-weight:500;}
.msg.assistant .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:18px 18px 18px 4px;}
.msg-thinking .msg-bubble{color:var(--text2);font-style:italic}
#chat-input-row{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;}
#chat-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:12px 16px;font-size:14px;color:var(--text);outline:none;transition:border-color var(--transition);}
#chat-input:focus{border-color:var(--accent)}
#chat-send{width:42px;height:42px;border-radius:50%;border:none;background:var(--accent);color:#1A1408;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all var(--transition);flex-shrink:0;}
#chat-send:hover{background:var(--accent2)}

#voice-bar{border-top:1px solid var(--border);padding:14px 24px;background:rgba(12,12,14,0.97);backdrop-filter:blur(20px);flex-shrink:0;}
#status-row{min-height:22px;display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;}
#status-text{color:var(--text2);transition:color var(--transition)}
.spin{width:13px;height:13px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;display:none}
#voice-input-row{display:flex;gap:10px;align-items:center}
#mic-btn,#attach-btn{width:50px;height:50px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;transition:all var(--transition);}
#mic-btn:hover,#attach-btn:hover{border-color:var(--accent);color:var(--accent)}
#mic-btn.recording{background:var(--red);border-color:var(--red);color:#fff;animation:micPulse 1.5s ease infinite}
.mic-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--red);animation:pulseRing 1.2s ease-out infinite;pointer-events:none;}
#voice-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 18px;font-size:14px;color:var(--text);outline:none;transition:border-color var(--transition);}
#voice-text::placeholder{color:var(--text3)}
#voice-text:focus{border-color:var(--border2)}
#voice-send{padding:12px 20px;border-radius:var(--r-md);border:none;background:var(--accent);color:#1A1408;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);display:none;white-space:nowrap;}
#voice-send:hover{background:var(--accent2)}
#file-input{display:none}
#attached-preview{display:none;margin-bottom:10px;padding:10px;background:var(--surface2);border-radius:var(--r-sm);font-size:12px;color:var(--text2);align-items:center;gap:10px}
#attached-preview img{max-height:60px;border-radius:4px}
.remove-attach{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex}
#modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:28px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;animation:modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow);}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:500}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px;transition:all var(--transition);}
.modal-close:hover{color:var(--text);background:var(--border2)}
.conf-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:6px;border:1px solid;margin-top:6px;display:inline-block;}
.mf{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.mf-icon{font-size:16px;margin-top:1px;flex-shrink:0}
.mf-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.mf-val{font-size:14px;color:var(--text)}
.modal-warn{background:rgba(232,160,32,0.1);border:1px solid rgba(232,160,32,0.2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--yellow);}
.modal-actions{display:flex;gap:10px;margin-top:24px}
.btn-cancel{flex:1;padding:12px;border-radius:var(--r-md);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:14px;transition:all var(--transition);}
.btn-cancel:hover{color:var(--text)}
.btn-primary{flex:2;padding:12px;border-radius:var(--r-md);border:none;background:var(--accent);color:#1A1408;cursor:pointer;font-size:14px;font-weight:600;transition:all var(--transition);}
.btn-primary:hover{background:var(--accent2)}
.btn-full{width:100%;padding:13px;border-radius:var(--r-md);border:none;background:var(--accent);color:#1A1408;cursor:pointer;font-size:14px;font-weight:600;transition:all var(--transition);}
.btn-full:hover{background:var(--accent2)}
.btn-danger{flex:1;padding:12px;border-radius:var(--r-md);border:none;background:rgba(224,92,106,0.12);color:var(--red);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition);}
.btn-danger:hover{background:rgba(224,92,106,0.22)}

.empty{padding:48px 24px;text-align:center;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:14px;line-height:1.6}
.ph{padding:28px 28px 0;flex-shrink:0}
.ph-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;margin-bottom:4px}
.ph-sub{font-size:13px;color:var(--text2)}

#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.hidden{display:none}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite}

@keyframes pulseRing{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.7);opacity:0}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(224,92,106,0.4)}50%{box-shadow:0 0 0 8px rgba(224,92,106,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.93)}to{opacity:1;transform:scale(1)}}

@media(max-width:768px){
  #sidebar{display:none}
  #nav .nav-btn{padding:6px 10px;font-size:11px}
  .ph{padding:20px 16px 0}
  .list-wrap{padding:16px}
  #voice-bar{padding:12px 16px}
  #chat-messages{padding:16px}
  #cal-wrap{padding:16px}
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader"></div>
  <div style="font-family:'Playfair Display',serif;font-size:22px;color:var(--accent)">claudia<span style="color:var(--text)">.</span></div>
</div>

<div id="header">
  <div id="logo">claudia<span>.</span></div>
  <div id="nav">
    <button class="nav-btn active" onclick="switchView('calendar')">Agenda</button>
    <button class="nav-btn" onclick="switchView('intentions')">Intenções</button>
    <button class="nav-btn" onclick="switchView('contacts')">Contatos</button>
    <button class="nav-btn" onclick="switchView('chat')">Secretária</button>
  </div>
</div>

<div id="app">
  <div id="view-calendar" class="view active">
    <div id="cal-container">
      <div id="cal-wrap">
        <div id="cal-nav-row">
          <button class="cal-arrow" onclick="navMonth(-1)">‹</button>
          <span id="cal-month-label"></span>
          <button class="cal-arrow" onclick="navMonth(1)">›</button>
        </div>
        <div id="today-summary"></div>
        <div id="cal-weekdays">
          <div class="cal-wd">D</div><div class="cal-wd">S</div><div class="cal-wd">T</div>
          <div class="cal-wd">Q</div><div class="cal-wd">Q</div><div class="cal-wd">S</div><div class="cal-wd">S</div>
        </div>
        <div id="cal-grid"></div>
      </div>
      <div id="sidebar">
        <div id="sidebar-header">
          <div id="sidebar-date"></div>
          <div id="sidebar-count"></div>
        </div>
        <div id="sidebar-events"></div>
      </div>
    </div>
  </div>

  <div id="view-intentions" class="view" style="overflow-y:auto">
    <div class="ph"><div class="ph-title">Intenções</div><div class="ph-sub">Planos sem data definida — um dia você vai fazer</div></div>
    <div class="list-wrap"><div id="int-grid" class="list-grid"></div></div>
  </div>

  <div id="view-contacts" class="view" style="overflow-y:auto">
    <div class="ph"><div class="ph-title">Contatos</div><div class="ph-sub">Pessoas importantes que a Claudia conhece</div></div>
    <div class="list-wrap"><div id="contacts-grid" class="list-grid"></div></div>
  </div>

  <div id="view-chat" class="view">
    <div id="chat-wrap">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" placeholder="Pergunte sobre sua agenda..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button id="chat-send" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>

<div id="voice-bar">
  <div id="status-row">
    <div class="spin" id="spin-icon"></div>
    <span id="status-text"></span>
  </div>
  <div id="attached-preview"></div>
  <div id="voice-input-row">
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Anexar imagem">📎</button>
    <input type="file" id="file-input" accept="image/*,application/pdf" onchange="onFileAttached(event)"/>
    <button id="mic-btn" onclick="toggleMic()">🎙️</button>
    <input id="voice-text" placeholder='Fale, escreva ou anexe um convite...' oninput="onVoiceInput()" onkeydown="if(event.key==='Enter')submitVoice()"/>
    <button id="voice-send" onclick="submitVoice()">Enviar</button>
  </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()"><div id="modal-content"></div></div>
</div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://ffvhokahvmfhjioczdfc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ol0yfe-VfuxgkkVeXKRAkA_VF7ODO_a';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const API_URL = '/api/claude';

const COLORS={trabalho:'#4A7CF7',saude:'#3DBD8A',lazer:'#E8A020',familia:'#E05C6A',pessoal:'#9B6EE0',outro:'#8A8A94'};
const ICONS={trabalho:'💼',saude:'🏥',lazer:'🎬',familia:'👨‍👩‍👧',pessoal:'✨',outro:'📌'};
const LABELS={trabalho:'Trabalho',saude:'Saúde',lazer:'Lazer',familia:'Família',pessoal:'Pessoal',outro:'Outro'};
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WDAYS=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

let events=[],intentions=[],contacts=[];
let chatHistory=[{role:'assistant',content:'Olá, André! Sou a Claudia, sua assistente pessoal. Posso criar compromissos por voz, texto ou imagem de convites, responder sobre sua agenda e ajudar a gerenciar suas intenções e contatos.'}];
let currentDate=new Date(),selectedDate=new Date();
let recognition=null,isRecording=false,pendingAI=null,attachedFile=null;

function uid(){return Math.random().toString(36).substr(2,9)+Date.now().toString(36)}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function dateFromISO(s){const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)}

function setStatus(msg,type,spin){
  const el=document.getElementById('status-text');
  document.getElementById('spin-icon').style.display=spin?'block':'none';
  el.textContent=msg;
  el.style.color=type==='error'?'var(--red)':type==='success'?'var(--green)':type==='recording'?'var(--red)':type==='loading'?'var(--accent)':'var(--text2)';
}

// ── DATA LAYER ──
async function loadAll(){
  const [e,i,c]=await Promise.all([
    sb.from('events').select('*').order('date'),
    sb.from('intentions').select('*').order('created_at',{ascending:false}),
    sb.from('contacts').select('*').order('name'),
  ]);
  events=e.data||[];
  intentions=i.data||[];
  contacts=c.data||[];
}

async function expandRecurringEvents(){
  // Expand recurring events into virtual instances for next 90 days
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date();end.setDate(end.getDate()+90);
  const expanded=[];
  for(const e of events){
    if(!e.recurrence||e.recurrence==='none'){expanded.push(e);continue;}
    const origDate=dateFromISO(e.date);
    let cur=new Date(origDate);
    let count=0;
    while(cur<=end&&count<200){
      if(cur>=today||sameDay(cur,origDate)){
        expanded.push({...e,date:`${cur.getFullYear()}-${pad(cur.getMonth()+1)}-${pad(cur.getDate())}`,_recurring:cur.getTime()!==origDate.getTime()});
      }
      if(e.recurrence==='daily')cur.setDate(cur.getDate()+1);
      else if(e.recurrence==='weekly')cur.setDate(cur.getDate()+7);
      else if(e.recurrence==='monthly')cur.setMonth(cur.getMonth()+1);
      else if(e.recurrence==='yearly')cur.setFullYear(cur.getFullYear()+1);
      else break;
      count++;
    }
  }
  return expanded;
}

let displayEvents=[];

// ── API ──
async function callAPI(messages, system, maxTokens=900, useImage=false){
  const body={model:'claude-sonnet-4-5',max_tokens:maxTokens,system,messages};
  const res=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
  return data.content?.map(b=>b.text||'').join('')||'';
}

async function toggleMic(){
  if(isRecording){stopMic();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
  }catch(err){setStatus('Microfone bloqueado','error',false);return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('Use o Chrome','error',false);return;}
  recognition=new SR();
  recognition.lang='pt-BR';recognition.continuous=false;recognition.interimResults=true;
  let finalText='';
  recognition.onstart=()=>setStatus('🔴 Ouvindo... fale agora','recording',false);
  recognition.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final)finalText+=final;
    setStatus('🔴 '+(finalText||interim),'recording',false);
  };
  recognition.onerror=e=>{setStatus('Erro: '+e.error,'error',false);setRecording(false);};
  recognition.onend=()=>{
    setRecording(false);
    if(finalText.trim())processInput(finalText.trim());
    else{setStatus('Nada captado','error',false);setTimeout(()=>setStatus('','',false),3000);}
  };
  try{recognition.start();setRecording(true);}catch(e){setStatus('Erro: '+e.message,'error',false);}
}

function stopMic(){if(recognition){try{recognition.stop();}catch(e){}}setRecording(false);}

function setRecording(v){
  isRecording=v;
  const btn=document.getElementById('mic-btn');
  btn.className=v?'recording':'';btn.textContent=v?'⏹':'🎙️';

  else btn.querySelectorAll('.mic-ring').forEach(r=>r.remove());
}

function onFileAttached(e){

async function processWithImage(text,file){
  setStatus('Analisando convite...','loading',true);
  const sys=`Você é uma secretária inteligente do André. Hoje é ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.

Analise a IMAGEM ou DOCUMENTO anexado (convite, cartão, print) e extraia as informações do evento.

Responda SOMENTE com JSON válido:
{"type":"event","title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"trabalho|saude|lazer|familia|pessoal|outro","location":"...","notes":"detalhes adicionais como traje, RSVP, etc","eventType":"individual|conjunto","confidence":"alta|media|baixa","missingInfo":null,"recurrence":"none"}

${getContext()}`;
  try{
    const base64=file.data.split(',')[1];
    const content=[
      {type:'image',source:{type:'base64',media_type:file.type,data:base64}},
      {type:'text',text:text}
    ];
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:800,system:sys,messages:[{role:'user',content}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content?.map(b=>b.text||'').join('')||'{}';
    pendingAI={...JSON.parse(raw.replace(/```json|```/g,'').trim()),originalText:text,attachedFileData:file.data,attachedFileName:file.name};
    clearAttachment();
    setStatus('','',false);
    showModal();
  }catch(e){
    setStatus('Erro: '+e.message,'error',false);
    setTimeout(()=>setStatus('','',false),4000);
  }
}

async function processInput(text){
  setStatus('Interpretando...','loading',true);
  const sys=`Você é uma secretária inteligente do André. Hoje é ${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}.

${getContext()}

Responda SOMENTE com JSON válido, sem markdown.

Tipos:
1. Evento: {"type":"event","title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"trabalho|saude|lazer|familia|pessoal|outro","location":"...","notes":"...","eventType":"individual|conjunto","confidence":"alta|media|baixa","missingInfo":null,"recurrence":"none|daily|weekly|monthly|yearly"}

3. Contato novo (ex: "minha esposa é Maria", "meu chefe João"): {"type":"contact","name":"...","relation":"esposa|chefe|amigo|filho|mãe|pai|etc","notes":"..."}
4. Pergunta/consulta: {"type":"question","answer":"resposta natural em português"}
5. Cancelamento: {"type":"action","action":"cancel","eventTitle":"...","answer":"..."}

Regras:
- Reconheça pessoas pelo contexto dos contatos (ex: "reunião com Gustavo" → use o contato Gustavo)
- Identifique recorrência ("todo dia", "toda semana", "todo mês") e marque em recurrence
- confidence: alta se claro, media se ambíguo, baixa se faltar info crítica
- Para eventos conjuntos (com família/cônjuge), use eventType:"conjunto"`;
  try{
    const raw=await callAPI([{role:'user',content:text}],sys,700);
    pendingAI={...JSON.parse(raw.replace(/```json|```/g,'').trim()),originalText:text};
    setStatus('','',false);
    showModal();
  }catch(e){
    setStatus('Erro: '+e.message,'error',false);
    setTimeout(()=>setStatus('','',false),4000);
  }

    ${mf('📅','Data',pendingAI.date)}

    ${mf('👥','Tipo',pendingAI.eventType==='conjunto'?'Conjunto':'Individual')}

async function confirmEvent(){

  const saved=await saveEvent(ev);
  if(saved&&s.date){const[y,m,d]=s.date.split('-');currentDate=new Date(+y,+m-1,1);selectedDate=new Date(+y,+m-1,+d);}
  closeModal();
  renderCalendar();renderSidebar();renderTodaySummary();

async function confirmIntention(){

  closeModal();

    ${e.recurrence&&e.recurrence!=='none'?mf('🔁','Recorrência',{daily:'Diária',weekly:'Semanal',monthly:'Mensal',yearly:'Anual'}[e.recurrence]):''}
    ${e.notes?mf('📝','Notas',e.notes):''}
    <div class="modal-actions"><button class="btn-danger" onclick="handleDeleteEvent('${e.id}')">Excluir</button><button class="btn-primary" onclick="closeModal()">Fechar</button></div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function handleDeleteEvent(id){
  await deleteEventDB(id);
  closeModal();
  renderCalendar();renderSidebar();renderTodaySummary();
}

// ── INIT ──
(async function init(){
  try{
    await loadAll();
    await refreshEvents();
    renderCalendar();
    renderSidebar();
    renderTodaySummary();
    renderChat();
    document.getElementById('loading-overlay').classList.add('hidden');
  }catch(e){
    console.error(e);
    document.getElementById('loading-overlay').innerHTML='<div style="color:var(--red);text-align:center"><div style="font-size:20px;margin-bottom:8px">Erro ao conectar</div><div style="font-size:13px;color:var(--text2)">'+e.message+'</div></div>';
  }
})();
</script>
</body>
</html>
